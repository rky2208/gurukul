server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip already-compressible text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache fingerprinted build assets aggressively; index.html stays fresh
    # so deploys are picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Single-page app: any unmatched path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
